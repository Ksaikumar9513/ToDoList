<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="./index.css" rel="stylesheet">;
   
</head>

<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">📝 Todo List</a>

            <button id="themeBtn" class="btn btn-light">
                🌙 Dark Mode
            </button>
        </div>
    </nav>

    <div class="container mt-5">

        <div class="row">

            <div class="col-lg-5 col-md-8 col-sm-12 mx-auto">

                <div class="card">

                    <div class="card-header bg-primary text-white text-center">
                        <h3>Manage Your Tasks</h3>
                    </div>

                    <div class="card-body">

                        <form id="todoForm">

                            <input type="text" id="taskInput" class="form-control" placeholder="Enter a task">

                            <button class="btn btn-primary w-100 mt-3" type="submit">

                                Add Task

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

        <div class="row mt-4">

            <div class="col-lg-7 col-md-10 col-sm-12 mx-auto">

                <div class="card">

                    <div class="card-header bg-dark text-white d-flex justify-content-between">

                        <span>Total :
                            <span id="totalCount">0</span>
                        </span>

                        <span>Completed :
                            <span id="completedCount">0</span>
                        </span>

                        <span>Pending :
                            <span id="pendingCount">0</span>
                        </span>

                    </div>

                    <div class="card-body">

                        <ul class="list-group" id="taskList">

                        </ul>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>

        
    </script>

</body>

</html>
